<form class="card" [formGroup]="carQuery">
  <div class="form-group">
    <div class="filter-row">

      <div class="make">
        <label for="makeFilter">Make</label>
        <select formControlName="makeId"
                class="form-control" id="makeFilter">
          <option></option>
          <option *ngFor="let make of makes" [value]="make.id">{{make.name}}</option>
        </select>
      </div>

      <div class="model" *ngIf="models">
        <label for="modelFilter">Model</label>
        <select formControlName="modelId" class="form-control" id="modelFilter">
          <option></option>
          <option *ngFor="let model of models" [value]="model.id">{{model.name}}</option>
        </select>
      </div>
    </div>

    <div class="filter-row">
      <div class="form-group">
        <label>Min Price</label>
        <input formControlName="pricemin" class="form-control form-control-sm" type="number">
      </div>
      <div class="form-group">
        <label>Max Price</label>
        <input formControlName="pricemax" class="form-control form-control-sm" type="number">
      </div>
    </div>

    <div class="filter-row">
      <div class="form-group">
        <label>Min year</label>

        <input formControlName="yearmin" class="form-control form-control-sm" type="number">
      </div>
      <div class="form-group">
        <label>Max year</label>
        <input formControlName="yearmax" class="form-control form-control-sm" type="number">
      </div>
    </div>



  </div>
</form>

<table class="table table-striped ">
  <thead>
    <tr>
      <th scope="col"></th>
      <th *ngFor="let column of columns" scope="col">
        <span *ngIf="column.isSortable" (click)="sort(column.name)">
          {{column.name}}
          <i class="demo-icon"
             [class.icon-down-micro]="carQuery.value.sortBy == column.name && carQuery.value.sortAsc"
             [class.icon-up-micro]="carQuery.value.sortBy == column.name && !carQuery.value.sortAsc"></i>
        </span>
        <span *ngIf="!column.isSortable">{{column.name}}</span>
      </th>
      <th scope="col"></th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let car of queryResult.items">
      <td class="align-middle" scope="col">
        <img *ngIf="car.thumbnail; else noimage" src="uploads/{{car.thumbnail}}" alt="">
        <ng-template #noimage>
          <img src="../../assets/noimage.png">
        </ng-template>
      </td>
      <td class="align-middle" scope="col">{{car.contact.name}}</td>
      <td class="align-middle" scope="col">{{car.price | currency}}</td>
      <!-- <td class="align-middle" scope="col">{{car.contact.email}}</td> -->
      <td class="align-middle" scope="col">{{car.make.name}}</td>
      <td class="align-middle" scope="col">{{car.model.name}}</td>
      <td class="align-middle" scope="col">{{car.year}}</td>
      <!-- <td class="align-middle" scope="col">{{car.registered ? "yes" : "no"}}</td> -->
      <td class="align-middle" scope="col">
        <a class="btn" [routerLink]="['/car',car.id]"> View</a>
      </td>
    </tr>

  </tbody>
</table>
<app-pagination
                *ngIf="queryResult.size > carQuery.value.PageSize"
                [itemsPerPage]="carQuery.value.PageSize"
                [totalPages]="queryResult.size"
                (onPageChange)="changePage($event)">
</app-pagination>
